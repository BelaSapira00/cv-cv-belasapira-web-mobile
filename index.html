<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CV Bela</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root {
  --navy: #1e2a38;
  --pink: #f8c8dc;
  --bg: #fdf2f7;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
}

/* NAVBAR */
nav {
  background: var(--navy);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav h2 {
  margin: 0;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 15px;
  padding: 0;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
  transition: 0.3s;
}

nav a:hover {
  background: var(--pink);
  color: var(--navy);
}

.active {
  background: var(--pink);
  color: var(--navy);
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
  transition: 0.3s;
}

/* CONTENT */
#content {
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

/* MOBILE */
@media (max-width: 600px){

  .menu-toggle {
    display: block;
  }

  nav {
    flex-wrap: wrap;
  }

  nav ul {
    display: none;
    flex-direction: column;
    width: 100%;
    background: var(--navy);
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    animation: slideDown 0.3s ease;
  }

  nav ul li {
    margin: 5px 0;
  }

  nav ul.show {
    display: flex;
  }

  @keyframes slideDown {
    from {opacity: 0; transform: translateY(-10px);}
    to {opacity: 1; transform: translateY(0);}
  }
}
</style>

</head>
<body>

<nav>
  <h2>My CV</h2>

  <!-- 🔥 HAMBURGER -->
  <div class="menu-toggle">☰</div>

  <ul id="navMenu">
    <li><a href="#" class="menu active" data-page="home.html">Home</a></li>
    <li><a href="#" class="menu" data-page="about.html">About</a></li>
    <li><a href="#" class="menu" data-page="contact.html">Contact</a></li>
    <li><a href="#" class="menu" data-page="github.html">GitHub</a></li>
    <li><a href="#" class="menu" data-page="skills.html">Skills</a></li>
    <li><a href="#" class="menu" data-page="education.html">Education</a></li>
    <li><a href="#" class="menu" data-page="experience.html">Experience</a></li>
    <li><a href="#" class="menu" data-page="portfolio.html">Portfolio</a></li>
    <li><a href="#" class="menu" data-page="certificate.html">Certificate</a></li>
  </ul>
</nav>

<div id="content"></div>

<script src="script.js"></script>

</body>
</html>
